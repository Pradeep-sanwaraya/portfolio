<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: antiquewhite;
      width: 100%;
      height: 100vh;
    }
   .container{
background-color: bisque;
position:absolute;
width:80%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}
    .header {
      background-color: rgb(59, 190, 190);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
    }
    .btn {
      background-color: black;
      color: azure;
      border: none;
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }
    .btn:hover {
      box-shadow: 2px 2px 10px rgba(116, 96, 68, 0.95);
    }
    .value {
      border: 3px solid gainsboro;
      padding: 0.3rem 1.5rem;
      font-weight: 600;
      border-radius: 5px;
      outline: none;
    }
    .gen-body {
      background-color: aliceblue;
      min-height: 400px;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
    }
    .gen-content {
      width: 100%;
      max-height: 500px;
      overflow-y: scroll;
      font-size: 1.3rem;
      padding: 1.9rem;
    }
    .gen-content::-webkit-scrollbar-track {
      background-color: cornsilk;
    }
  </style>
</head>
<body>
  <div class="container">
    <form id="form">
      <div class="header">
        <div class="left">
          <input type="number" id="num-input" class="value" value="5">
          <select id="opt" class="value">
            <option value="paras">Paragraph</option>
            <option value="sentences">Sentence</option>
          </select>
        </div>
        <div class="right">
          <button type="button" class="btn" id="gen-btn">Generate</button>
          <button type="button" class="btn" id="copy-btn">Copy</button>
        </div>
      </div>
    </form>
    <div class="gen-body">
      <div class="gen-content">Click "Generate" to get Lorem Ipsum text...</div>
    </div>
  </div>

  <script>
    const inputNum = document.querySelector("#num-input");
    const inputOpt = document.querySelector("#opt");
    const genBtn = document.querySelector("#gen-btn");
    const copyBtn = document.querySelector("#copy-btn");
    const genContent = document.querySelector(".gen-content");

    genBtn.addEventListener("click", () => {
      getValues();
    });

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(genContent.textContent);
      copyBtn.textContent = "Copied!";
      setTimeout(() => (copyBtn.textContent = "Copy"), 1500);
    });

    function getValues() {
      const count = inputNum.value;
      const option = inputOpt.value;
      const url = `https://baconipsum.com/api/?type=meat-and-filler&${option}=${count}&start-with-lorem=1`;
      fetchContent(url);
    }

    async function fetchContent(url) {
      try {
        const response = await fetch(url);
        if (response.ok) {
          const data = await response.json();
          genContent.textContent = data.join("\n\n");
        } else {
          genContent.textContent = "Error: Could not fetch data!";
        }
      } catch (error) {
        genContent.textContent = "Network Error!";
      }
    }
  </script>
</body>
</html>
