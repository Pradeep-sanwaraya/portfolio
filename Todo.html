<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
            text-align: center;
            color: grey;
            margin: 50px;
        }
        .main{
            background-color: beige;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
        input{
            width: 70%;
            padding: 8px;
        }
        button{
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 4px;
            background-color: aquamarine;
            color: white;
            cursor: pointer;
        }
        ul{
            list-style: none;
            margin-top: 20px;
        }
        ul li{
            background: aliceblue;
            margin: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
        ul li button{
            background: red;
            padding: 5px 10px;
            color: white;
        }
    </style>
</head>

<body>

<h1>ToDo LIST</h1>

<div class="main">
    <input type="text" id="inputdata" placeholder="Enter your task">
    <button class="btn1">Add</button>

    <ul class="todoul"></ul>
</div>

<script>
    let inputele = document.querySelector("#inputdata");
    let btnele = document.querySelector(".btn1");
    let todoele = document.querySelector(".todoul");
    let todolist=localStorage.getItem("todo") ? JSON.parse(localStorage.getItem("todo")) : 
    [];

 btnele.addEventListener("click",()=>{
    let obj={
        title:inputele.value,
        isStatus:true
    }
    todolist.push(obj);
    console.log(todolist)
    localStorage.setItem("todo",JSON.stringify(todolist))
     inputele.value = "";
    showdata();
 })
 
let showdata = () => {
    todoele.innerHTML = "";   // 👈 ye line sab fix karegi

    todolist.forEach((item, index) => {
        todoele.innerHTML +=
        `<li>
            <span onclick="taskmark(${index})" style="text-decoration: ${item.isStatus ? '' :'line-through'}">${index+1} ${item.title}</span>
            <button>&times;</button>
        </li>`;
    });
}

 showdata();
 let taskmark=(currentindex)=>{
    todolist[currentindex].isStatus=!todolist[currentindex].isStatus
        localStorage.setItem("todo",JSON.stringify(todolist))
showdata();

 }
</script>

</body>
</html>
